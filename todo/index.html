<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App - Local Storage</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">📝 My Tasks</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>
        </header>

        <!-- Main App -->
        <main class="main">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>

            <!-- Todos List -->
            <div class="todos-container">
                <ul class="todos-list" id="todoList">
                    <!-- Todos will be inserted here -->
                </ul>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📭</div>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="btn-secondary">Clear Completed</button>
                <button id="clearAll" class="btn-danger">Clear All</button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>📱 Your tasks are saved locally • No internet required</p>
            <p class="version">v1.0.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
